services:
  esp32-ai-voice-cloud:
    build: .
    container_name: esp32-ai-voice-cloud
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./runtime:/app/runtime
    ports:
      - "${SERVER_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
