name: CI

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:

jobs:
  test-cloud:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run tests
        env:
          WS_TOKEN: test-token
          ALLOW_EMPTY_TOKEN: "false"
        run: pytest -q

      - name: Validate shell scripts
        run: bash -n deploy.sh install.sh install-debian.sh install-ubuntu.sh manage.sh uninstall.sh scripts/doctor.sh

      - name: Build Docker image
        run: docker build -t esp32-ai-voice-cloud:test .
